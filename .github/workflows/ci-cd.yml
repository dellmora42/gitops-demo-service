name: GitOps Demo CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
          pip install .[test]

      - name: Run tests
        run: |
          pytest

      - name: Generate build metadata
        id: meta
        run: |
          SHA=${GITHUB_SHA::8}
          echo "sha=${SHA}" >> $GITHUB_OUTPUT
          
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi
          
          if [[ $GITHUB_REF == refs/heads/main ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          elif [[ $GITHUB_REF == refs/heads/develop ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          else
            echo "environment=none" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./gitops-demo-service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/gitops-demo:${{ steps.meta.outputs.sha }}
            ${{ steps.meta.outputs.is_release == 'true' && format('{0}//gitops-demo-service:{1}', secrets.DOCKER_USERNAME, steps.meta.outputs.version) || '' }}
            ${{ github.ref == 'refs/heads/main' && format('{0}//gitops-demo-service:latest', secrets.DOCKER_USERNAME) || '' }}
            ${{ github.ref == 'refs/heads/develop' && format('{0}//gitops-demo-service:develop', secrets.DOCKER_USERNAME) || '' }}

      - name: Update GitOps configuration
        if: steps.meta.outputs.environment != 'none'
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          git clone https://${{ secrets.K8S_GITHUB_PAT }}@github.com/${{ github.repository_owner }}/gitops-demo-config.git
          cd gitops-demo-config
          
          ENV_PATH="environments/${{ steps.meta.outputs.environment }}"
          
          # Create/update version file for GitOps
          echo "/gitops-demo-service:${{ steps.meta.outputs.sha }}" > ${ENV_PATH}//gitops-demo-service.version
          
          git add .
          git commit -m "Update /gitops-demo-service to ${{ steps.meta.outputs.sha }} in ${{ steps.meta.outputs.environment }}"
          git push